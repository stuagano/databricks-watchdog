# Example Customer Rule Primitives
#
# Shows how to add customer-specific reusable rule building blocks.
# Copy the entries you need into engine/ontologies/rule_primitives.yml
# under the primitives section before deploying.

primitives:

  # ── Regulatory ────────────────────────────────────────────────────────

  has_regulatory_domain:
    type: tag_exists
    description: "Asset identifies its regulatory domain"
    keys: [regulatory_domain]

  # ── Conditional Compositions ──────────────────────────────────────────

  hipaa_has_steward:
    type: if_then
    description: "If asset is HIPAA-regulated, it must have a data steward and retention policy"
    condition:
      type: tag_equals
      key: regulatory_domain
      value: "HIPAA"
    then:
      type: all_of
      rules:
        - type: tag_exists
          keys: [data_steward]
        - type: tag_exists
          keys: [retention_days]
