<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watchdog Guardrails</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #212121;
  --sidebar: #171717;
  --surface: #2f2f2f;
  --input-bg: #2f2f2f;
  --border: #3d3d3d;
  --text: #ececec;
  --muted: #8e8ea0;
  --accent: #10a37f;
  --blocked-bg: #2d1515;
  --blocked-border: #7f1d1d;
  --blocked-text: #fca5a5;
  --ok-bg: #0f2d1a;
  --ok-border: #14532d;
  --ok-text: #86efac;
  --mono: ui-monospace, 'SF Mono', 'Cascadia Code', monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 16px 12px;
  gap: 4px;
}

.sidebar-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  padding: 4px 8px 10px;
}

.sidebar-item {
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-item.active { background: rgba(255,255,255,0.07); color: var(--text); }

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  margin-left: auto;
  box-shadow: 0 0 6px var(--accent);
}

.sidebar-footer {
  margin-top: auto;
  border-top: 1px solid var(--border);
  padding-top: 12px;
  font-size: 11px;
  color: #444;
  line-height: 1.6;
  padding-left: 8px;
}

/* ── Chat ── */
.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.chat-header {
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.model-badge {
  font-size: 11px;
  color: var(--muted);
  background: var(--surface);
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  margin-left: auto;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 28px 0 8px;
  display: flex;
  flex-direction: column;
}

.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Message rows ── */
.msg { padding: 6px 24px; animation: fadeUp 0.25s ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg.user { display: flex; justify-content: flex-end; }

.msg.user .bubble {
  background: var(--surface);
  border-radius: 18px 18px 4px 18px;
  padding: 10px 16px;
  max-width: 65%;
  font-size: 14px;
  line-height: 1.5;
}

.msg.assistant { display: flex; gap: 12px; align-items: flex-start; }

.avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  margin-top: 3px;
}

.msg.assistant .body {
  flex: 1;
  min-width: 0;
  max-width: 680px;
}

.msg.assistant .body p {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  margin-bottom: 10px;
}

.msg.assistant .body p:last-child { margin-bottom: 0; }

/* ── Inline guard notice ── */
.guard-notice {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: var(--blocked-bg);
  border: 1px solid var(--blocked-border);
  border-radius: 8px;
  padding: 10px 14px;
  margin: 4px 0 10px;
  font-size: 13px;
  line-height: 1.5;
  color: var(--blocked-text);
}

.guard-notice .icon { flex-shrink: 0; font-size: 14px; margin-top: 1px; }

/* ── Data table ── */
.table-wrap {
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin: 8px 0 10px;
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 12px;
}

.data-table th {
  background: rgba(255,255,255,0.04);
  padding: 7px 12px;
  text-align: left;
  color: var(--muted);
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.data-table td {
  padding: 6px 12px;
  border-bottom: 1px solid rgba(61,61,61,0.5);
  color: var(--text);
  white-space: nowrap;
}

.data-table tr:last-child td { border-bottom: none; }
.data-table .overdue { color: #fca5a5; }
.data-table .highlight { color: #fde68a; }

.table-meta {
  font-size: 11px;
  color: var(--muted);
  margin: 2px 0 8px;
}

/* ── Typing indicator ── */
.typing { display: none; align-items: center; gap: 12px; padding: 8px 24px; }
.typing.visible { display: flex; }
.typing-dots { display: flex; gap: 4px; }
.typing-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  animation: bounce 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
  30% { transform: translateY(-4px); opacity: 1; }
}

/* ── Input area ── */
.input-area {
  border-top: 1px solid var(--border);
  padding: 10px 24px 18px;
  flex-shrink: 0;
}

.suggestions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
  min-height: 30px;
}

.pill {
  display: inline-flex;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 5px 13px;
  font-size: 12.5px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.12s;
  user-select: none;
  white-space: nowrap;
}

.pill:hover { border-color: var(--accent); color: var(--text); }

.input-row { display: flex; gap: 10px; align-items: flex-end; }

.input-box {
  flex: 1;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 14px;
  font-family: var(--sans);
  color: var(--text);
  resize: none;
  outline: none;
  min-height: 42px;
  max-height: 100px;
  line-height: 1.5;
  transition: border-color 0.12s;
}

.input-box:focus { border-color: var(--accent); }
.input-box::placeholder { color: var(--muted); }

.send-btn {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: var(--accent);
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.12s;
}

.send-btn:hover { opacity: 0.85; }

code {
  font-family: var(--mono);
  font-size: 12px;
  background: rgba(255,255,255,0.07);
  padding: 1px 5px;
  border-radius: 3px;
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-title">Watchdog</div>
  <div class="sidebar-item active">
    <span>🛡️</span> Billing Assistant
    <div class="status-dot"></div>
  </div>
  <div class="sidebar-item"><span>📋</span> Violations</div>
  <div class="sidebar-item"><span>📊</span> Policies</div>
  <div class="sidebar-item"><span>🔍</span> Scan History</div>
  <div class="sidebar-footer">
    Watchdog Guardrails · fe-stable<br>
    explain_my_bill · 4 tables
  </div>
</div>

<div class="chat">
  <div class="chat-header">
    Billing Assistant
    <span class="model-badge">Guardrails MCP · fe-stable</span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="typing" id="typing">
    <div class="avatar">🛡️</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>

  <div class="input-area">
    <div class="suggestions" id="suggestions"></div>
    <div class="input-row">
      <textarea class="input-box" id="input" rows="1"
        placeholder="Ask about billing, customers, or usage…"></textarea>
      <button class="send-btn" onclick="sendCurrent()">↑</button>
    </div>
  </div>
</div>

<script>
const SCRIPT = [
  {
    pill: "Which customers have overdue bills right now?",
    user: "Which customers have overdue bills right now?",
    delay: 750,
    response: [
      {
        type: "guard",
        text: "Customer names are protected — pulling from billing records instead."
      },
      {
        type: "table",
        columns: ["Account", "Amount Due", "Months Overdue"],
        rows: [
          ["CUST-0008", "$858.00", "2", "overdue"],
          ["CUST-0004", "$419.10", "1", "overdue"],
        ]
      },
      {
        type: "text",
        html: `<p>CUST-0008 is your most at-risk — two consecutive missed payments. Want me to look at what's driving the bill?</p>`
      }
    ],
    nextPills: [
      "Yes — what's driving CUST-0008's bill?",
      "Start over"
    ]
  },
  {
    pill: "Yes — what's driving CUST-0008's bill?",
    user: "Yes — what's driving it?",
    delay: 700,
    response: [
      {
        type: "text",
        html: `<p>They're on Time-of-Use pricing but 68% of their load falls in peak windows. At a flat rate they'd pay ~$180/month — they're paying $458.</p>`
      },
      {
        type: "table",
        columns: ["Month", "Peak Charge", "Total Bill"],
        rows: [
          ["March 2026", "$312.40", "$458.70"],
          ["Feb 2026",   "$278.10", "$399.30"],
        ]
      },
      {
        type: "text",
        html: `<p>Good candidate for a rate plan conversation.</p>`
      }
    ],
    nextPills: [
      "Start over"
    ]
  },
  {
    pill: "Start over",
    user: null,
    action: "reset"
  }
];

// ── Engine ──────────────────────────────────────────

let busy = false;

function appendUserMsg(text) {
  const c = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `<div class="bubble">${text}</div>`;
  c.appendChild(el);
  scrollBottom();
}

function appendAssistantMsg(parts) {
  const c = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg assistant';

  let html = '';
  for (const p of parts) {
    if (p.type === 'guard') {
      html += `<div class="guard-notice"><span class="icon">🔒</span><span>${p.text}</span></div>`;
    } else if (p.type === 'text') {
      html += `<div class="body-text">${p.html}</div>`;
    } else if (p.type === 'table') {
      const heads = p.columns.map(c => `<th>${c}</th>`).join('');
      const rows  = p.rows.map(r => {
        const cells = r.map((cell, i) => {
          const cls = r[r.length-1] === 'overdue' && i < r.length-1 ? ' class="overdue"' :
                      i === r.length-2 && r[r.length-1] === 'overdue' ? ' class="overdue"' : '';
          return `<td${i === 1 && r[r.length-1] === 'overdue' ? '' : ''}>${cell}</td>`;
        });
        // For status rows, mark whole row
        if (r[r.length-1] === 'overdue') {
          return `<tr>${r.slice(0,-1).map(c => `<td class="overdue">${c}</td>`).join('')}</tr>`;
        }
        return `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`;
      }).join('');
      html += `<div class="table-wrap"><table class="data-table"><thead><tr>${heads}</tr></thead><tbody>${rows}</tbody></table></div>`;
    }
  }

  el.innerHTML = `<div class="avatar">🛡️</div><div class="body">${html}</div>`;
  // Fix: wrap loose text in body p tags
  el.querySelectorAll('.body-text p').forEach(p => {
    p.style.fontSize = '14px';
    p.style.lineHeight = '1.6';
    p.style.marginBottom = '8px';
  });
  c.appendChild(el);
  scrollBottom();
}

function setTyping(v) {
  document.getElementById('typing').className = v ? 'typing visible' : 'typing';
  if (v) scrollBottom();
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function renderPills(pills) {
  const c = document.getElementById('suggestions');
  c.innerHTML = '';
  (pills || []).forEach(label => {
    const b = document.createElement('button');
    b.className = 'pill';
    b.textContent = label;
    b.onclick = () => triggerPill(label);
    c.appendChild(b);
  });
}

function triggerPill(label) {
  if (busy) return;
  const s = SCRIPT.find(s => s.pill === label);
  if (!s) return;
  if (s.action === 'reset') { reset(); return; }

  renderPills([]);
  appendUserMsg(s.user);
  busy = true;

  setTimeout(() => {
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      appendAssistantMsg(s.response);
      renderPills(s.nextPills || []);
      busy = false;
    }, s.delay);
  }, 280);
}

function sendCurrent() {
  const inp = document.getElementById('input');
  const text = inp.value.trim();
  if (!text || busy) return;
  inp.value = '';
  appendUserMsg(text);
  busy = true;
  setTimeout(() => {
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      appendAssistantMsg([{ type: 'text', html: `<p>I can query billing history, usage data, and rate plans while keeping customer names and addresses protected. Use the suggestions below to try a guided flow, or ask me anything.</p>` }]);
      busy = false;
    }, 650);
  }, 200);
}

function reset() {
  busy = false;
  document.getElementById('messages').innerHTML = '';
  renderPills([SCRIPT[0].pill]);
  setTimeout(() => {
    appendAssistantMsg([{ type: 'text', html: `<p>Connected to your billing data on fe-stable. I can answer questions about customers, usage, and billing — and I'll automatically work around any data that needs to stay protected.</p><p>What do you want to know?</p>` }]);
  }, 250);
}

// ── Init ──
const inp = document.getElementById('input');
inp.addEventListener('input', () => {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 100) + 'px';
});
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendCurrent(); }
});

reset();
</script>
</body>
</html>
