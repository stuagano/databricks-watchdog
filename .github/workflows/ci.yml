name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements-test.txt

      - name: Run unit tests
        env:
          PYTHONPATH: engine/src:mcp/src:guardrails/src:ontos-adapter/src
        run: pytest tests/unit/ -v --tb=short

  lint:
    name: Lint & policy lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pyyaml

      - name: Ruff (lint)
        run: ruff check engine/src mcp/src guardrails/src ontos-adapter/src tests

      - name: Validate policy YAML
        run: python scripts/lint_policies.py

  policy-pack-tests:
    name: Policy pack tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements-test.txt

      - name: Run policy pack unit tests
        env:
          PYTHONPATH: engine/src
        run: pytest tests/unit/test_policy_pack_*.py -v
