# Example Customer Compliance Domains
#
# Shows how to customize escalation contacts and regulatory sub-domains
# for a specific customer. Copy to engine/ontologies/compliance_domains.yml
# and replace placeholder values with your customer's contacts.

domains:

  CostGovernance:
    description: "Cost attribution, chargeback, and resource optimization"
    owner_role: "platform_admin"
    severity_floor: medium
    escalation: "data-platform@acme.com"
    sub_domains:
      - Tagging
      - IdleResources
      - Sizing

  SecurityGovernance:
    description: "Access control, encryption, network isolation, identity management"
    owner_role: "security_admin"
    severity_floor: high
    escalation: "infosec@acme.com"
    sub_domains:
      - AccessControl
      - Encryption
      - NetworkIsolation
      - IdentityHygiene

  DataQuality:
    description: "Documentation, naming conventions, lineage, schema standards"
    owner_role: "data_steward"
    severity_floor: low
    escalation: "data-governance@acme.com"
    sub_domains:
      - Documentation
      - NamingConventions
      - Lineage
      - SchemaStandards

  OperationalGovernance:
    description: "Runtime versions, retry policies, alerting, SLA compliance"
    owner_role: "platform_admin"
    severity_floor: medium
    escalation: "platform-ops@acme.com"
    sub_domains:
      - RuntimeCompliance
      - Alerting
      - SlaManagement
      - RetryPolicies

  RegulatoryCompliance:
    description: "HIPAA, SOX, and data retention obligations"
    owner_role: "compliance_officer"
    severity_floor: critical
    escalation: "legal-compliance@acme.com"
    sub_domains:
      - HealthcareCompliance
      - FinancialCompliance
      - DataRetention

  DataClassification:
    description: "Ensuring all data assets are properly classified and labeled"
    owner_role: "data_steward"
    severity_floor: high
    escalation: "data-governance@acme.com"
    sub_domains:
      - SensitivityLabeling
      - BusinessUnitAttribution
      - DataLayerTagging
