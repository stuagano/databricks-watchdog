# Example Regulatory Compliance Policies
# Domain: RegulatoryCompliance
# Owner: compliance_officer
#
# Shows how to write regulatory policies that reference customer-specific
# ontology classes and rule primitives. Adapt for your customer's
# regulatory requirements (HIPAA, SOX, GDPR, etc.).

policies:

  - id: POL-R001
    name: "HIPAA assets must have a data steward and retention policy"
    applies_to: HipaaAsset
    domain: RegulatoryCompliance
    severity: critical
    description: "HIPAA-regulated data requires a named steward and retention period"
    remediation: "Add 'data_steward' tag (email of responsible person) and 'retention_days' tag"
    active: true
    rule:
      ref: hipaa_has_steward

  - id: POL-R002
    name: "SOX assets must have a data steward"
    applies_to: SoxAsset
    domain: RegulatoryCompliance
    severity: critical
    description: "SOX-regulated financial data must have an accountable steward"
    remediation: "Add a 'data_steward' tag with the email of the responsible person"
    active: true
    rule:
      ref: has_data_steward

  - id: POL-R003
    name: "All data assets must declare data classification"
    applies_to: DataAsset
    domain: RegulatoryCompliance
    severity: high
    description: "Unclassified data is a compliance risk — all assets must be labeled"
    remediation: "Add 'data_classification' tag (public, internal, confidential, restricted, pii)"
    active: true
    rule:
      ref: has_data_classification

  - id: POL-R004
    name: "PII assets must have retention policy"
    applies_to: PiiAsset
    domain: RegulatoryCompliance
    severity: critical
    description: "PII data must specify a retention period for privacy compliance"
    remediation: "Add 'retention_days' tag with the maximum retention period in days"
    active: true
    rule:
      ref: has_retention_policy

  - id: POL-R005
    name: "Regulated assets must identify their regulatory domain"
    applies_to: ConfidentialAsset
    domain: RegulatoryCompliance
    severity: high
    description: "Confidential data should declare which regulation applies"
    remediation: "Add 'regulatory_domain' tag (HIPAA, SOX, GDPR, etc.)"
    active: true
    rule:
      ref: has_regulatory_domain
