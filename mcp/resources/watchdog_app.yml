resources:
  apps:
    watchdog_mcp:
      name: "watchdog-mcp-${bundle.target}"
      description: |
        Watchdog Governance MCP — on-behalf-of auth. Each user's UC
        permissions on platform.watchdog govern what governance data
        they can query. No separate ACL layer.
      source_code_path: ..
      config:
        command:
          - uvicorn
          - watchdog_mcp.server:app
          - --host
          - 0.0.0.0
          - --port
          - "8000"
        env:
          - name: DATABRICKS_CATALOG
            value: ${var.catalog}
          - name: DATABRICKS_SCHEMA
            value: ${var.schema}
          - name: DATABRICKS_WAREHOUSE_ID
            value: ${var.warehouse_id}
        resources:
          - name: "sql-warehouse"
            description: "SQL Warehouse for user-scoped governance queries"
            sql_warehouse:
              id: ${var.warehouse_id}
              permission: "CAN_USE"
        user_authorization:
          scopes:
            - sql
      permissions:
        - user_name: stuart.gano@databricks.com
          level: CAN_MANAGE
