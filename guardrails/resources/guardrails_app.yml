resources:
  apps:
    mcp_ai_guardrails:
      name: "mcp-ai-guardrails-${bundle.target}"
      description: "AI DevKit governance guardrails — classification-aware validation, cost estimation, audit logging. Reads Watchdog classifications + violations for build-time governance."
      source_code_path: ..
      config:
        command:
          - uvicorn
          - ai_devkit.server:app
          - --host
          - 0.0.0.0
          - --port
          - "8000"
        env:
          - name: DATABRICKS_CATALOG
            value: ${var.catalog}
          - name: DATABRICKS_WAREHOUSE_ID
            value: ${var.warehouse_id}
          - name: WATCHDOG_SCHEMA
            value: ${var.watchdog_schema}
      permissions:
        - user_name: stuart.gano@databricks.com
          level: CAN_MANAGE
