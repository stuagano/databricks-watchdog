command:
  - uvicorn
  - watchdog_mcp.server:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"
env:
  - name: DATABRICKS_CATALOG
    value: serverless_stable_s0v155_catalog
  - name: DATABRICKS_SCHEMA
    value: watchdog
  - name: DATABRICKS_WAREHOUSE_ID
    value: 2053827451af25b6

resources:
  - name: "sql-warehouse"
    description: "SQL Warehouse for user-scoped governance queries"
    sql_warehouse:
      id: "{{DATABRICKS_WAREHOUSE_ID}}"
      permission: "CAN_USE"

user_authorization:
  scopes:
    - sql
