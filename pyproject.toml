[tool.ruff]
line-length = 110
target-version = "py310"
exclude = [
    ".git",
    "engine/notebooks",
    "docs",
    "terraform",
    "library",
    "customer",
    "template",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",
    "E741",
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["F401", "F811"]
"**/__init__.py" = ["F401"]
# conftest.py stubs pyspark modules before importing pytest; E402 is intentional.
"tests/unit/conftest.py" = ["E402"]
# Pre-existing unused-local in violations.py — not part of the gap fix.
"engine/src/watchdog/violations.py" = ["F841"]

[tool.pytest.ini_options]
testpaths = ["tests/unit"]
pythonpath = [
    "engine/src",
    "mcp/src",
    "guardrails/src",
    "ontos-adapter/src",
]
