# Example Customer Resource Classes
#
# These classes show how to extend the generic base in
# engine/ontologies/resource_classes.yml for a specific customer.
#
# To use: copy the entries you need into engine/ontologies/resource_classes.yml
# under the derived_classes section before deploying.
#
# This example includes:
#   - HIPAA regulatory classes (healthcare)
#   - Business unit scoping classes

derived_classes:

  # ── Regulatory domain classes ─────────────────────────────────────────

  HipaaAsset:
    parent: ConfidentialAsset
    description: "Subject to HIPAA regulations"
    classifier:
      tag_equals:
        regulatory_domain: "HIPAA"

  SoxAsset:
    parent: ConfidentialAsset
    description: "Subject to SOX financial compliance"
    classifier:
      tag_equals:
        regulatory_domain: "SOX"

  # ── Business unit scoping ─────────────────────────────────────────────

  EngineeringAsset:
    parent: DataAsset
    description: "Owned by the Engineering business unit"
    classifier:
      tag_equals:
        business_unit: "engineering"

  SalesAsset:
    parent: DataAsset
    description: "Owned by the Sales business unit"
    classifier:
      tag_equals:
        business_unit: "sales"

  FinanceAsset:
    parent: DataAsset
    description: "Owned by the Finance business unit"
    classifier:
      tag_equals:
        business_unit: "finance"
