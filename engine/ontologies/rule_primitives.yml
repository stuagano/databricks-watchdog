# Rule Primitives — reusable building blocks for policy rules
#
# Policies compose rules from these primitives. Each primitive is a named,
# reusable check that can be referenced by ID in policy definitions.
#
# Rule types:
#   tag_exists:        Tag key must be present (any value)
#   tag_equals:        Tag must equal specific value
#   tag_in:            Tag value must be in allowed set
#   tag_not_in:        Tag value must NOT be in disallowed set
#   tag_matches:       Tag value must match regex
#   metadata_equals:   Metadata field must equal value
#   metadata_matches:  Metadata field must match regex
#   metadata_not_empty: Metadata field must exist and be non-empty
#   metadata_gte:      Metadata field >= threshold (numeric/version comparison)
#   metadata_lte:      Metadata field <= threshold (numeric/version comparison)
#   has_owner:         Resource must have owner field or owner tag
#   all_of:            All child rules must pass (AND)
#   any_of:            At least one child rule must pass (OR)
#   none_of:           No child rules may pass (NOT)
#   if_then:           Conditional — if condition matches, then check must pass

primitives:

  # ── Ownership & Attribution ────────────────────────────────────────────

  has_owner:
    type: any_of
    description: "Resource has an identifiable owner"
    rules:
      - type: metadata_not_empty
        field: owner
      - type: tag_exists
        keys: [owner]

  has_cost_center:
    type: tag_exists
    description: "Resource is attributed to a cost center"
    keys: [cost_center]

  has_business_unit:
    type: tag_exists
    description: "Resource is tagged with a business unit"
    keys: [business_unit]

  has_environment_tag:
    type: tag_exists
    description: "Resource has an environment designation"
    keys: [environment]

  has_team_tag:
    type: tag_exists
    description: "Resource is attributed to a team"
    keys: [team]

  # ── Data Classification ────────────────────────────────────────────────

  has_data_classification:
    type: tag_exists
    description: "Data asset has a sensitivity classification label"
    keys: [data_classification]

  has_data_layer:
    type: tag_exists
    description: "Table is tagged with its medallion layer (bronze/silver/gold)"
    keys: [data_layer]

  valid_data_classification:
    type: tag_in
    description: "Data classification tag uses an approved value"
    key: data_classification
    allowed: [public, internal, confidential, restricted, pii]

  valid_environment:
    type: tag_in
    description: "Environment tag uses an approved value"
    key: environment
    allowed: [dev, test, staging, prod]

  valid_data_layer:
    type: tag_in
    description: "Data layer tag uses an approved medallion value"
    key: data_layer
    allowed: [bronze, silver, gold, platinum, raw]

  # ── Data Stewardship ──────────────────────────────────────────────────

  has_data_steward:
    type: tag_exists
    description: "Regulated asset has a named data steward"
    keys: [data_steward]

  has_retention_policy:
    type: tag_exists
    description: "Asset specifies a retention policy"
    keys: [retention_days]

  # ── Customer-specific primitives ─────────────────────────────────────
  # Add your customer's regulatory or industry-specific primitives here.
  # See customer/ontologies/rule_primitives.yml for an example
  # (regulatory domain, conditional compositions).

  # ── Documentation ──────────────────────────────────────────────────────

  has_table_comment:
    type: metadata_not_empty
    description: "Table has a non-empty comment/description"
    field: comment

  has_description_tag:
    type: tag_exists
    description: "Resource has a description tag"
    keys: [description]

  # ── Operational ────────────────────────────────────────────────────────

  is_production:
    type: tag_equals
    description: "Resource is tagged as production"
    key: environment
    value: "prod"

  has_on_call_team:
    type: tag_exists
    description: "Production resource has an on-call team designated"
    keys: [on_call_team]

  has_sla_tier:
    type: tag_exists
    description: "Resource has an SLA tier designation"
    keys: [sla_tier]

  has_alert_channel:
    type: tag_exists
    description: "Resource has a notification/alert channel configured"
    keys: [alert_channel]

  runtime_current:
    type: metadata_gte
    description: "Compute uses a current Databricks runtime version"
    field: spark_version
    threshold: "15.4"

  has_autotermination:
    type: metadata_not_empty
    description: "Cluster has auto-termination configured"
    field: autotermination_minutes

  # ── Identity & Permissions ────────────────────────────────────────────

  is_account_level_group:
    type: metadata_equals
    description: "Group is an account-level group (SCIM-synced from IdP), not workspace-local"
    field: group_type
    value: "account"

  is_workspace_local_group:
    type: metadata_equals
    description: "Group is workspace-local (not federated across workspaces)"
    field: group_type
    value: "workspace_local"

  group_has_members:
    type: metadata_not_empty
    description: "Group has at least one member (empty groups are dead weight)"
    field: member_count

  group_has_entitlements:
    type: metadata_not_empty
    description: "Group has entitlements assigned (workspace access, cluster create, etc.)"
    field: entitlements

  # ── Conditional Compositions ───────────────────────────────────────────

  production_has_alerting:
    type: if_then
    description: "If resource is production, it must have alerting configured"
    condition:
      type: tag_equals
      key: environment
      value: "prod"
    then:
      type: all_of
      rules:
        - type: tag_exists
          keys: [on_call_team]
        - type: tag_exists
          keys: [alert_channel]

  pii_has_steward:
    type: if_then
    description: "If data is PII, it must have a data steward"
    condition:
      type: tag_equals
      key: data_classification
      value: "pii"
    then:
      type: all_of
      rules:
        - type: tag_exists
          keys: [data_steward]
        - type: tag_exists
          keys: [retention_days]

  # ── Access Governance ──────────────────────────────────────────────────

  no_all_privileges:
    type: none_of
    description: "Resource must not have ALL PRIVILEGES granted"
    rules:
      - type: metadata_equals
        field: privilege
        value: "ALL PRIVILEGES"

  grant_uses_groups:
    type: metadata_matches
    description: "Grants must be assigned to groups, not individual users"
    field: grantee
    pattern: "^(group:|account group:)"

  sp_not_workspace_admin:
    type: none_of
    description: "Service principal must not have workspace admin entitlements"
    rules:
      - type: metadata_matches
        field: entitlements
        pattern: "workspace-admin"

  group_has_multiple_members:
    type: metadata_gte
    description: "Groups with MANAGE privilege should have at least 2 members"
    field: member_count
    threshold: "2"

  # ── Agent Governance ──────────────────────────────────────────────────

  is_managed_endpoint:
    description: "Endpoint is a Databricks-managed FMAPI model (not a customer agent)"
    type: tag_equals
    key: managed_endpoint
    value: "true"

  is_customer_agent:
    description: "Agent is customer-deployed (not a Databricks FMAPI endpoint)"
    type: none_of
    rules:
      - type: tag_equals
        key: managed_endpoint
        value: "true"

  agent_has_audit_logging:
    description: "Agent must have audit logging enabled"
    type: tag_equals
    key: audit_logging_enabled
    value: "true"

  has_agent_owner:
    description: "Agent must have a designated owner"
    type: tag_exists
    keys: [agent_owner, deployed_by]

  has_data_export_approval:
    description: "Agents exporting data must have documented approval"
    type: all_of
    rules:
      - type: tag_exists
        keys: [data_export_approved_by]
      - type: tag_exists
        keys: [data_export_justification]

  has_external_access_registration:
    description: "Agents calling external endpoints must be registered"
    type: tag_exists
    keys: [external_access_registered, external_endpoints_approved]

  not_accessing_production:
    description: "Resource must not be accessing production data"
    type: none_of
    rules:
      - type: tag_equals
        key: accesses_production
        value: "true"

  execution_has_trace:
    description: "Agent execution must have an MLflow trace"
    type: tag_exists
    keys: [trace_id, mlflow_trace_id]

  pii_table_count_under_threshold:
    description: "Agent should not access more than 10 PII tables in one execution"
    type: metadata_gte
    field: pii_tables_accessed_count
    value: "0"

  agent_has_model_governance:
    description: "Agent must specify which model endpoint it uses"
    type: tag_exists
    keys: [model_endpoint, serving_endpoint]

  agent_execution_under_duration_limit:
    description: "Agent executions should complete within timeout"
    type: tag_exists
    keys: [execution_completed]

  agent_has_error_handling:
    description: "Agent must have error handling/fallback configured"
    type: tag_exists
    keys: [error_handler, fallback_behavior]

  # Customer-specific conditional compositions go here.
  # See customer/ontologies/rule_primitives.yml for examples.
